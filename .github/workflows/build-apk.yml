name: Build Personal APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Generate required source files
        run: |
          cp localdomain.default.js localdomain.js
          node scripts/generate-theme-css.js
          node scripts/build-markdown.js
          TS_NODE_TRANSPILE_ONLY=1 npx ts-node scripts/build-exercises.ts
          TS_NODE_TRANSPILE_ONLY=1 npx ts-node scripts/build-programs.ts

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006"

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Personal Build, OU=Personal, O=Personal, L=City, S=State, C=US"

      - name: Clear keystore.properties (use debug signing)
        run: echo "" > android/keystore.properties

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -x lint \
            -x test
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ORG_GRADLE_PROJECT_reactNativeArchitectures: arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: liftosaur-personal-apk
          path: android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 90
